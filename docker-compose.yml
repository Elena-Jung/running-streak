services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    # 호스트에 포트를 발행하지 않는다 → 기존 호스트 PostgreSQL(127.0.0.1:5432) 과 충돌 회피.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    # 인바운드 포트 없음. 아웃바운드(디스코드)만 사용.

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
